name: Ops-Bot: Alert Loop

on:
  workflow_run:
    workflows: ["CI", "search-cron", "Traffic Simulator", "Traffic Simulator (Monitored)", "ALS Events Scraper", "Supabase Daily Schema Backup", "Supabase Weekly Full Backup", "Supabase Monthly Full Backup", "Backup Cleanup - Retention Policy Enforcement", "Voting Automation", "Dev-Bot: Implementation Loop", "Ops-Bot: Alert Loop", "Policy Guard", "Temp Fix TTL Monitor"]
    types: [completed]
  schedule:
    - cron: '*/10 * * * *'
    - cron: '0 10 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ops-alert-${{ github.ref }}
  cancel-in-progress: false

jobs:
  react_and_iterate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect missing workflow runs (last 24h)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const monitored = [
              "CI",
              "search-cron",
              "Traffic Simulator",
              "Traffic Simulator (Monitored)",
              "ALS Events Scraper",
              "Supabase Daily Schema Backup",
              "Supabase Weekly Full Backup",
              "Supabase Monthly Full Backup",
              "Backup Cleanup - Retention Policy Enforcement",
              "Voting Automation",
              "Dev-Bot: Implementation Loop",
              "Ops-Bot: Alert Loop",
              "Policy Guard",
              "Temp Fix TTL Monitor"
            ];
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, { owner, repo, per_page: 100 });
            const lastByName = {};
            for (const r of runs) {
              const n = r.name || String(r.workflow_id);
              if (!lastByName[n] || new Date(r.created_at) > new Date(lastByName[n].created_at)) lastByName[n] = r;
            }
            const now = Date.now();
            for (const name of monitored) {
              const last = lastByName[name];
              const lastTs = last ? new Date(last.created_at).getTime() : 0;
              const ageH = (now - lastTs) / 3600000;
              if (!last || ageH > 24) {
                const title = `Alert: ${name} missing runs`;
                const { data: search } = await github.rest.search.issuesAndPullRequests({ q: `repo:${owner}/${repo} is:issue in:title "${title}" state:open` });
                const body = `No run detected in the last ${Math.floor(ageH)}h.\n\nNext: Investigate schedule/permissions, re-enable workflow, verify by manual dispatch.`;
                if (search.total_count > 0) {
                  await github.rest.issues.update({ owner, repo, issue_number: search.items[0].number, labels: ['ops','ops:active'], body });
                } else {
                  await github.rest.issues.create({ owner, repo, title, body, labels: ['ops','ops:active','priority:1'] });
                }
              }
            }

      - name: Determine alerts to handle
        id: pick
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            // If triggered by a failing run, focus that; otherwise poll open ops alerts
            let targets = [];
            if (context.eventName === 'workflow_run') {
              const run = context.payload.workflow_run;
              if (['failure','timed_out','cancelled'].includes(run.conclusion)) {
                targets.push({type:'run', id: run.id, name: run.name, url: run.html_url});
              }
            }
            const issues = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: 'open', labels: 'ops,ops:active', per_page: 100 });
            for (const i of issues) targets.push({type:'issue', number: i.number, title: i.title});
            core.setOutput('targets', JSON.stringify(targets));

      - name: Handle targets (open/update alert issues and draft remediation PRs)
        if: steps.pick.outputs.targets != '[]'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const targets = JSON.parse(steps.pick.outputs.targets);
            const now = new Date().toISOString();
            for (const t of targets.slice(0,3)) {
              if (t.type === 'run') {
                const title = `Alert: ${t.name} failing`;
                const { data: search } = await github.rest.search.issuesAndPullRequests({ q: `repo:${owner}/${repo} is:issue in:title "${title}" state:open` });
                const body = `Workflow failing at ${now}.\n\nRun: ${t.url}\n\nNext: Diagnose logs, propose remediation, test.`;
                if (search.total_count > 0) {
                  await github.rest.issues.update({ owner, repo, issue_number: search.items[0].number, labels: ['ops','ops:active'], body });
                } else {
                  await github.rest.issues.create({ owner, repo, title, body, labels: ['ops','ops:active','priority:1'] });
                }
              } else if (t.type === 'issue') {
                await github.rest.issues.createComment({ owner, repo, issue_number: t.number, body: `Next: Attempt remediation at ${now}` });
              }
            }

      - name: Validation placeholder
        run: |
          echo "Run specific infra/CI validation tests here (lint, plan, e2e)."