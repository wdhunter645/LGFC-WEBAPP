name: Ops-Bot: Alert Loop

on:
  workflow_run:
    workflows: ["ci", "Dev-Bot: Implementation Loop", "Dev-Bot: Daily Plan", "Ops-Bot: Daily Report"]
    types: [completed]
  schedule:
    - cron: '*/10 * * * *'
    - cron: '0 10 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ops-alert-${{ github.ref }}
  cancel-in-progress: false

jobs:
  react_and_iterate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Determine alerts to handle
        id: pick
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            // If triggered by a failing run, focus that; otherwise poll open ops alerts
            let targets = [];
            if (context.eventName === 'workflow_run') {
              const run = context.payload.workflow_run;
              if (['failure','timed_out','cancelled'].includes(run.conclusion)) {
                targets.push({type:'run', id: run.id, name: run.name, url: run.html_url});
              }
            }
            const issues = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: 'open', labels: 'ops,ops:active', per_page: 100 });
            for (const i of issues) targets.push({type:'issue', number: i.number, title: i.title});
            core.setOutput('targets', JSON.stringify(targets));
      - name: Handle targets
        if: steps.pick.outputs.targets != '[]'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const targets = JSON.parse(steps.pick.outputs.targets);
            const now = new Date().toISOString();
            for (const t of targets.slice(0,3)) {
              if (t.type === 'run') {
                // Open/Update an alert issue for this run
                const title = `Alert: ${t.name} failing`;
                const { data: search } = await github.rest.search.issuesAndPullRequests({ q: `repo:${owner}/${repo} is:issue in:title "${title}" state:open` });
                const body = `Workflow failing at ${now}.\n\nRun: ${t.url}\n\nNext: Diagnose logs, propose remediation, test.`;
                if (search.total_count > 0) {
                  await github.rest.issues.update({ owner, repo, issue_number: search.items[0].number, labels: ['ops','ops:active'], body });
                } else {
                  await github.rest.issues.create({ owner, repo, title, body, labels: ['ops','ops:active','priority:1'] });
                }
              } else if (t.type === 'issue') {
                // Continue remediation loop: ensure branch/PR exists and run validations
                const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number: t.number });
                const slug = issue.title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
                const branch = `cursor/ops-bot/${issue.number}-${slug}`;
                await exec.exec('bash', ['-lc', `
                  set -e
                  git fetch origin
                  if ! git show-ref --verify --quiet refs/heads/${branch}; then
                    git checkout -b ${branch}
                    echo "ops-bot heartbeat $(date -u +%FT%TZ)" >> .ops-bot.heartbeat
                    git add .ops-bot.heartbeat || true
                    git config user.name "ops-bot"
                    git config user.email "ops-bot@users.noreply.github.com"
                    git commit -m "ops-bot: bootstrap branch for #${issue.number}"
                    git push -u origin ${branch}
                  else
                    git checkout ${branch}
                  fi
                `]);
                const prs = await github.rest.pulls.list({ owner, repo, state: 'open', head: `${owner}:${branch}` });
                if (!prs.data.length) {
                  await github.rest.pulls.create({ owner, repo, title: `ops-bot: ${issue.title} (#${issue.number})`, head: branch, base: 'main', draft: true, body: 'Automated remediation PR. Linked issue #' + issue.number });
                }
                await github.rest.issues.createComment({ owner, repo, issue_number: issue.number, body: `Next: Attempt remediation at ${now}` });
              }
            }
      - name: Validation placeholder
        run: |
          echo "Run specific infra/CI validation tests here (lint, plan, e2e)."

